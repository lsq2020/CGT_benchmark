services:
  - type: web
    name: protein-bench
    env: python
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        fromDatabase:
          name: protein-bench-db
          property: connectionString

databases:
  - name: protein-bench-db
    databaseName: protein_bench
    user: protein_bench
